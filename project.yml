name: Fetch
options:
  bundleIdPrefix: com.chih-han
  createIntermediateGroups: true

packages:
  Highlightr:
    url: https://github.com/raspu/Highlightr
    from: "2.1.2"

targets:
  Fetch:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - Fetch
    resources:
      - path: Fetch/menubar-icon.png
      - path: Fetch/icon-foxfire.png
      - path: Fetch/icon-gloaming.png
      - path: Fetch/icon-smoulder.png
    dependencies:
      - package: Highlightr
    settings:
      base:
        SWIFT_VERSION: "5.9"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    info:
      path: Fetch/Info.plist
      properties:
        CFBundleName: Fetch
        CFBundleVersion: "1"
        CFBundleShortVersionString: "1.1.4"

  FetchTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - FetchTests
    dependencies:
      - target: Fetch
    settings:
      base:
        SWIFT_VERSION: "5.9"
        GENERATE_INFOPLIST_FILE: YES
