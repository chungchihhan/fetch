<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Fetch Demo</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    :root {
      --bg:        #1c1d20;
      --panel:     rgba(40, 41, 45, 0.72);
      --panel-br:  rgba(255, 255, 255, 0.08);
      --row-bg:    rgba(255, 255, 255, 0.05);
      --row-br:    rgba(255, 255, 255, 0.10);
      --row-br-hi: rgba(120, 201, 171, 0.70);
      --focus-bg:  rgba(120, 201, 171, 0.16);
      --edit-br:   rgba(230, 207, 95, 0.75);
      --edit-bg:   rgba(230, 207, 95, 0.16);
      --text:      rgba(255, 255, 255, 0.90);
      --muted:     rgba(255, 255, 255, 0.55);
      --faint:     rgba(255, 255, 255, 0.35);
      --accent:    #78c9ab;
      --edit:      #e6cf5f;
      --mono: ui-monospace, "SF Mono", Menlo, Monaco, Consolas, monospace;
    }

    html, body {
      margin: 0;
      height: 100%;
    }
    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      color: var(--text);
      font-family: var(--mono);
      font-size: 11px;
      background:
        radial-gradient(1200px 600px at 20% 10%,  rgba(120,201,171,0.10), transparent 60%),
        radial-gradient(900px 500px at 100% 100%, rgba(130,181,212,0.08), transparent 60%),
        var(--bg);
      perspective: 1400px;
    }

    .popover {
      position: relative;
      width: min(420px, 94vw);
      padding: 12px 12px 0;
      background: var(--panel);
      backdrop-filter: blur(22px) saturate(140%);
      -webkit-backdrop-filter: blur(22px) saturate(140%);
      border: 1px solid var(--panel-br);
      border-radius: 12px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.45);
      transform-style: preserve-3d;
      transition:
        transform 220ms cubic-bezier(.2,.8,.2,1),
        box-shadow 220ms cubic-bezier(.2,.8,.2,1);
      will-change: transform;
    }
    /* A soft highlight that continuously sweeps clockwise around the rim */
    @property --arc-angle {
      syntax: "<angle>";
      initial-value: 0deg;
      inherits: false;
    }
    .popover::before {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: 12px;
      padding: 1.5px;
      background: conic-gradient(
        from var(--arc-angle),
        rgba(255, 255, 255, 0.00) 0deg,
        rgba(255, 255, 255, 0.55) 40deg,
        rgba(255, 255, 255, 0.00) 110deg,
        rgba(255, 255, 255, 0.00) 360deg
      );
      -webkit-mask:
        linear-gradient(#fff 0 0) content-box,
        linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
              mask-composite: exclude;
      filter: drop-shadow(0 0 4px rgba(255, 255, 255, 0.35));
      pointer-events: none;
      animation: rim-spin 9s linear infinite;
    }
    @keyframes rim-spin {
      to { --arc-angle: 360deg; }
    }

    .tabbar {
      position: relative;
      display: flex;
      gap: 4px;
      padding: 2px 4px 10px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      margin-bottom: 14px;
    }
    .tab {
      font: 10px var(--mono);
      color: var(--muted);
      padding: 3px 12px;
      border-radius: 10px;
      border: 1px solid transparent;
    }
    .tab.active {
      color: var(--accent);
      background: rgba(120,201,171,0.15);
      border-color: rgba(120,201,171,0.40);
    }
    .tabbar .status {
      position: absolute;
      right: 8px;
      top: 5px;
      font: 9px var(--mono);
      opacity: 0;
      transition: opacity 150ms;
    }
    .tabbar .status.visible { opacity: 1; }
    .tabbar .status.copied  { color: var(--accent); }
    .tabbar .status.editing { color: var(--edit); }

    .row {
      padding: 8px;
      margin: 0 6px 10px 6px;
      background: transparent;
      border: 1px solid var(--row-br);
      border-radius: 8px;
      cursor: pointer;
      transition: background 120ms, border-color 120ms;
    }
    .row:hover { background: rgba(255,255,255,0.05); }
    .row.focused {
      background: var(--focus-bg);
      border-color: var(--row-br-hi);
    }
    .row.editing {
      background: var(--edit-bg);
      border-color: var(--edit-br);
      cursor: default;
    }

    .title {
      display: flex;
      align-items: center;
      gap: 4px;
      margin-bottom: 6px;
    }
    .hash {
      color: var(--accent);
      opacity: 0.90;
    }
    .row.editing .hash { color: var(--edit); opacity: 1; }

    .title-input {
      flex: 1;
      font: 11px var(--mono);
      color: var(--text);
      background: transparent;
      border: 0;
      outline: none;
      padding: 0;
      caret-color: var(--edit);
      pointer-events: none;
    }
    .row.editing .title-input { pointer-events: auto; }
    .title-input::placeholder { color: var(--faint); }

    /* Edit button — pencil, scales & glows on hover */
    .edit-btn {
      width: 20px;
      height: 20px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: transparent;
      border: 0;
      padding: 0;
      cursor: pointer;
      color: rgba(255,255,255,0.50);
      transition: color 180ms ease-in-out, transform 180ms ease-in-out, filter 180ms ease-in-out;
    }
    .edit-btn:hover {
      color: var(--accent);
      transform: scale(1.18);
      filter: drop-shadow(0 0 4px rgba(120,201,171,0.6));
    }
    .row.editing .edit-btn { visibility: hidden; }
    .edit-btn svg { width: 13px; height: 13px; display: block; }

    .code {
      padding: 7px;
      background: var(--row-bg);
      border-radius: 5px;
    }
    .code-input {
      width: 100%;
      padding: 0;
      font: 11px var(--mono);
      color: var(--text);
      background: transparent;
      border: 0;
      outline: none;
      resize: none;
      caret-color: var(--edit);
      line-height: 1.5;
      min-height: 16px;
      pointer-events: none;
    }
    .row.editing .code-input { pointer-events: auto; }
    .code-input::placeholder { color: var(--faint); }

    .hintbar {
      position: relative;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 10px 12px;
      margin-top: 4px;
      border-top: 1px solid rgba(255,255,255,0.08);
      font: 9px var(--mono);
      color: var(--muted);
    }
    .hintbar .gear {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 11px;
      color: rgba(255,255,255,0.40);
      cursor: pointer;
      border: 0;
      background: transparent;
      padding: 0;
    }
    .hintbar .gear:hover { color: var(--text); }
  </style>
</head>
<body>
  <section class="popover" id="popover">
    <div class="tabbar">
      <div class="tab active">⌘1</div>
      <div class="tab">⌘2</div>
      <div class="tab">⌘3</div>
      <div class="tab">⌘4</div>
      <div class="tab">⌘5</div>
      <div class="tab">⌘6</div>
      <div class="status" id="status"></div>
    </div>

    <div class="row" data-row>
      <div class="title">
        <span class="hash">#</span>
        <input class="title-input" type="text" value="" readonly />
        <button class="edit-btn" type="button" aria-label="Edit" title="Edit snippet (⌘E)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M20 14v5a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h5"/>
            <path d="M18.5 2.5a2.12 2.12 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5Z"/>
          </svg>
        </button>
      </div>
      <div class="code">
        <textarea class="code-input" rows="1" readonly></textarea>
      </div>
    </div>

    <div class="row" data-row>
      <div class="title">
        <span class="hash">#</span>
        <input class="title-input" type="text" value="" readonly />
        <button class="edit-btn" type="button" aria-label="Edit" title="Edit snippet (⌘E)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M20 14v5a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h5"/>
            <path d="M18.5 2.5a2.12 2.12 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5Z"/>
          </svg>
        </button>
      </div>
      <div class="code">
        <textarea class="code-input" rows="1" readonly></textarea>
      </div>
    </div>

    <div class="row" data-row>
      <div class="title">
        <span class="hash">#</span>
        <input class="title-input" type="text" value="" readonly />
        <button class="edit-btn" type="button" aria-label="Edit" title="Edit snippet (⌘E)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M20 14v5a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h5"/>
            <path d="M18.5 2.5a2.12 2.12 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5Z"/>
          </svg>
        </button>
      </div>
      <div class="code">
        <textarea class="code-input" rows="1" readonly></textarea>
      </div>
    </div>

    <div class="hintbar">
      <span id="hint">↑↓ navigate · ↵ copy · ⌘E edit · ⌘N new · ⌘D delete · ⌘Z undo</span>
      <button class="gear" title="Settings (⌘,)">⚙</button>
    </div>
  </section>

  <script>
    // ── textarea auto-grow ───────────────────────────────────────────
    const grow = (el) => {
      el.style.height = "auto";
      el.style.height = el.scrollHeight + "px";
    };
    document.querySelectorAll(".code-input").forEach((ta) => {
      grow(ta);
      ta.addEventListener("input", () => grow(ta));
    });

    // ── status toast (top-right of tab bar) ──────────────────────────
    const status = document.getElementById("status");
    const hint   = document.getElementById("hint");
    let copyTimer = null;

    const refreshStatus = () => {
      if (copyTimer) return; // toast in flight
      const editing = !!document.querySelector(".row.editing");
      if (editing) {
        status.textContent = "Edit Mode";
        status.className = "status editing visible";
      } else {
        status.className = "status";
        status.textContent = "";
      }
    };
    const flashCopied = () => {
      if (copyTimer) clearTimeout(copyTimer);
      status.textContent = "Copied";
      status.className = "status copied visible";
      copyTimer = setTimeout(() => {
        copyTimer = null;
        refreshStatus();
      }, 1200);
    };

    const setHint = (editing) => {
      hint.textContent = editing
        ? "Tab/⇧Tab fields · ↵ save · Esc save · ⇧↵ newline"
        : "↑↓ navigate · ↵ copy · ⌘E edit · ⌘N new · ⌘D delete · ⌘Z undo";
    };

    // ── row interactions ─────────────────────────────────────────────
    const rows = document.querySelectorAll("[data-row]");

    const exitEdit = (row) => {
      if (!row.classList.contains("editing")) return;
      row.classList.remove("editing");
      row.querySelectorAll(".title-input, .code-input").forEach((el) => el.setAttribute("readonly", ""));
      setHint(false);
      refreshStatus();
    };

    const enterEdit = (row) => {
      rows.forEach((r) => exitEdit(r));
      row.classList.add("editing");
      row.classList.remove("focused");
      const title = row.querySelector(".title-input");
      const code  = row.querySelector(".code-input");
      title.removeAttribute("readonly");
      code.removeAttribute("readonly");
      setHint(true);
      refreshStatus();
      // focus title after this tick so the click doesn't steal it
      setTimeout(() => { title.focus(); title.select(); }, 0);
    };

    rows.forEach((row) => {
      // click on the row → copy code + show "Copied"
      row.addEventListener("click", (e) => {
        if (row.classList.contains("editing")) return;
        if (e.target.closest(".edit-btn")) return;

        rows.forEach((r) => r.classList.remove("focused"));
        row.classList.add("focused");

        const code = row.querySelector(".code-input").value;
        navigator.clipboard?.writeText(code).catch(() => {});
        flashCopied();
      });

      // edit button → enter edit mode
      row.querySelector(".edit-btn").addEventListener("mousedown", (e) => {
        e.preventDefault();   // don't steal focus from the textarea yet
        e.stopPropagation();  // don't bubble to row (which would copy)
        enterEdit(row);
      });

      // save + exit on Enter (title) / Esc anywhere / Enter without shift in code
      row.addEventListener("keydown", (e) => {
        if (!row.classList.contains("editing")) return;
        if (e.key === "Escape") { e.preventDefault(); exitEdit(row); }
        if (e.key === "Enter") {
          if (e.target.classList.contains("code-input") && e.shiftKey) return; // ⇧↵ → newline
          e.preventDefault();
          exitEdit(row);
        }
      });
    });

    // click outside any row → exit edit
    document.addEventListener("mousedown", (e) => {
      const row = e.target.closest("[data-row]");
      rows.forEach((r) => {
        if (r !== row && r.classList.contains("editing")) exitEdit(r);
      });
    });

    // ── very subtle edge tilt + halo behind the hovered side ─────────
    const card = document.getElementById("popover");
    const MAX_TILT_X = 1.2, MAX_TILT_Y = 1.6, LIFT_PX = 1.2;

    card.addEventListener("mousemove", (e) => {
      const r = card.getBoundingClientRect();
      const px = (e.clientX - r.left) / r.width;
      const py = (e.clientY - r.top)  / r.height;

      const edgeX = Math.max(0, Math.abs(px - 0.5) * 2 - 0.3) / 0.7;
      const edgeY = Math.max(0, Math.abs(py - 0.5) * 2 - 0.3) / 0.7;
      const rotY = (px - 0.5) * 2 * MAX_TILT_Y * edgeX;
      const rotX = (0.5 - py) * 2 * MAX_TILT_X * edgeY;
      const lift = Math.max(edgeX, edgeY) * LIFT_PX;

      card.style.transform =
        `translateY(${-lift}px) perspective(1400px) rotateX(${rotX}deg) rotateY(${rotY}deg)`;
    });

    card.addEventListener("mouseleave", () => {
      card.style.transform = "";
    });
  </script>
</body>
</html>
